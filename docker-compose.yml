version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: subagent-nginx
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - subagent-network

  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: subagent-backend
    volumes:
      - ./backend:/var/www/html
    environment:
      - APP_NAME=${APP_NAME}
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PUSHER_APP_ID=${PUSHER_APP_ID}
      - PUSHER_APP_KEY=${PUSHER_APP_KEY}
      - PUSHER_APP_SECRET=${PUSHER_APP_SECRET}
      - PUSHER_HOST=soketi
      - PUSHER_PORT=6001
    depends_on:
      - mysql
      - redis
    networks:
      - subagent-network

  queue-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: subagent-queue-worker
    volumes:
      - ./backend:/var/www/html
      - ./docker/supervisor/queue-worker.conf:/etc/supervisor/conf.d/queue-worker.conf
    command: supervisord -c /etc/supervisor/supervisord.conf
    environment:
      - APP_NAME=${APP_NAME}
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PUSHER_APP_ID=${PUSHER_APP_ID}
      - PUSHER_APP_KEY=${PUSHER_APP_KEY}
      - PUSHER_APP_SECRET=${PUSHER_APP_SECRET}
      - PUSHER_HOST=soketi
      - PUSHER_PORT=6001
    depends_on:
      - mysql
      - redis
      - backend
    networks:
      - subagent-network

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: subagent-scheduler
    volumes:
      - ./backend:/var/www/html
      - ./docker/supervisor/scheduler.conf:/etc/supervisor/conf.d/scheduler.conf
    command: supervisord -c /etc/supervisor/supervisord.conf
    environment:
      - APP_NAME=${APP_NAME}
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - mysql
      - redis
      - backend
    networks:
      - subagent-network

  soketi:
    image: quay.io/soketi/soketi:1.6-16-debian
    container_name: subagent-soketi
    ports:
      - "6001:6001"
      - "9601:9601"
    environment:
      - SOKETI_DEBUG=1
      - SOKETI_DEFAULT_APP_ID=${PUSHER_APP_ID}
      - SOKETI_DEFAULT_APP_KEY=${PUSHER_APP_KEY}
      - SOKETI_DEFAULT_APP_SECRET=${PUSHER_APP_SECRET}
      - SOKETI_DEFAULT_APP_ENABLE_CLIENT_MESSAGES=true
      - SOKETI_DEFAULT_APP_ENABLED=true
    networks:
      - subagent-network

  frontend:
    image: node:20-alpine
    container_name: subagent-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_PUSHER_APP_KEY=${PUSHER_APP_KEY}
      - VITE_PUSHER_HOST=localhost
      - VITE_PUSHER_PORT=6001
      - VITE_API_URL=http://localhost/api
    depends_on:
      - backend
      - soketi
    networks:
      - subagent-network

  mysql:
    image: mysql:8.0
    container_name: subagent-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    volumes:
      - ./storage/mysql:/var/lib/mysql
    networks:
      - subagent-network

  redis:
    image: redis:alpine
    container_name: subagent-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./storage/redis:/data
    networks:
      - subagent-network

networks:
  subagent-network:
    driver: bridge
