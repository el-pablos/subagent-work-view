[program:laravel-claude-events]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/live-agents.tams.codes/backend/artisan queue:work redis-high-throughput --queue=claude-events --sleep=1 --tries=3 --max-time=3600 --memory=128
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=4
redirect_stderr=true
stdout_logfile=/var/www/live-agents.tams.codes/backend/storage/logs/claude-events-worker.log
stopwaitsecs=3600

